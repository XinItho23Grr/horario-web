<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Turnos 4x4</title>
    <style>
        :root { --bg-main: #090d16; --bg-surface: #131c2e; --text: #f8fafc; --accent: #3b82f6; --border: #22314d; }
        body { background: var(--bg-main); color: var(--text); font-family: sans-serif; margin: 0; padding: 20px; }
        .container { max-width: 1000px; margin: auto; display: flex; flex-direction: column; gap: 20px; }
        .panel { background: var(--bg-surface); padding: 20px; border-radius: 12px; border: 1px solid var(--border); display: flex; gap: 15px; align-items: center; justify-content: center; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; background: var(--border); border: 1px solid var(--border); }
        .cell { background: var(--bg-surface); min-height: 100px; padding: 10px; cursor: pointer; }
        .cell:hover { background: #1b273f; }
        .input-box { padding: 10px; background: var(--bg-main); border: 1px solid var(--border); color: white; border-radius: 5px; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; background: var(--accent); color: white; font-weight: bold; }
        .btn-danger { background: #ef4444; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #10b981; color: white; padding: 15px 30px; border-radius: 50px; opacity: 0; pointer-events: none; transition: 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <div class="panel">
        <input type="date" id="start-date" class="input-box">
        <select id="pattern" class="input-box">
            <option value="4x4_dia">☀️ 4x4 Solo Día</option>
            <option value="4x4_noche">🌙 4x4 Solo Noche</option>
            <option value="4x4_rotativo">🔄 4x4 Rotativo (16 días)</option>
        </select>
        <button class="btn" id="btn-apply">Aplicar Secuencia</button>
        <button class="btn btn-danger" id="btn-delete">🗑️ Eliminar Todo</button>
    </div>
    <div class="grid" id="calendar">
        <div class="cell">Lun</div><div class="cell">Mar</div><div class="cell">Mié</div>
        <div class="cell">Jue</div><div class="cell">Vie</div><div class="cell">Sáb</div><div class="cell">Dom</div>
    </div>
</div>

<div id="toast">Acción completada</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, writeBatch } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // --- PEGA TUS DATOS DE FIREBASE AQUÍ ABAJO ---
    const firebaseConfig = {
        apiKey: "TU_API_KEY",
        authDomain: "TU_PROYECTO.firebaseapp.com",
        projectId: "TU_PROYECTO",
        storageBucket: "TU_PROYECTO.appspot.com",
        messagingSenderId: "TU_ID",
        appId: "TU_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.style.opacity = 1;
        setTimeout(() => t.style.opacity = 0, 3000);
    }

    document.getElementById('btn-apply').addEventListener('click', async () => {
        const dateInput = document.getElementById('start-date').value;
        const pattern = document.getElementById('pattern').value;
        if (!dateInput) return alert("Selecciona una fecha");
        if (!auth.currentUser) return alert("Debes iniciar sesión");

        const cycles = {
            '4x4_dia': ['D','D','D','D','L','L','L','L'],
            '4x4_noche': ['N','N','N','N','L','L','L','L'],
            '4x4_rotativo': ['D','D','D','D','L','L','L','L','N','N','N','N','L','L','L','L']
        };

        const seq = cycles[pattern];
        const startDate = new Date(dateInput + "T00:00:00");
        const batch = writeBatch(db);

        for (let i = 0; i < 180; i++) {
            let f = new Date(startDate);
            f.setDate(startDate.getDate() + i);
            let id = f.toISOString().split('T')[0];
            batch.set(doc(db, "usuarios_4x4", auth.currentUser.uid, "turnos", id), { texto: seq[i % seq.length] });
        }
        await batch.commit();
        showToast("¡Secuencia aplicada correctamente!");
        location.reload();
    });

    document.getElementById('btn-delete').addEventListener('click', () => {
        if(confirm("¿Estás seguro de borrar todo?")) {
            showToast("Horario eliminado (Lógica de borrado lista)");
            // Aquí llamarías a la función para limpiar Firestore
        }
    });
</script>
</body>
</html>
