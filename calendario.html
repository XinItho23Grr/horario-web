<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horario Web - Gestión de Turnos Profesional</title>
    <style>
        :root {
            --bg-main: #090d16; --bg-surface: #131c2e; --bg-surface-hover: #1b273f;
            --text-primary: #f8fafc; --text-secondary: #94a3b8; --border-subtle: #22314d;
            --accent-primary: #3b82f6; --color-dia: #eab308; --color-noche: #3b82f6;
            --color-extra: #10b981; --color-libre: #475569;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-primary); min-height: 100vh; display: flex; justify-content: center; padding: 24px; }
        .main-container { width: 100%; max-width: 1100px; display: flex; flex-direction: column; gap: 24px; }
        header { display: flex; justify-content: space-between; align-items: center; background: var(--bg-surface); padding: 18px 28px; border-radius: 14px; border: 1px solid var(--border-subtle); }
        .auto-panel { background: var(--bg-surface); padding: 20px 28px; border-radius: 14px; border: 1px solid var(--border-subtle); display: flex; justify-content: space-between; align-items: center; gap: 24px; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border-subtle); padding: 1px; }
        .day-cell { background: var(--bg-surface); min-height: 120px; padding: 14px; cursor: pointer; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5,8,15,0.85); backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--bg-surface); border: 1px solid var(--border-subtle); width: 90%; max-width: 380px; border-radius: 20px; padding: 28px; text-align: center; }
        .modal-input { width: 100%; padding: 12px; background: var(--bg-main); color: white; border: 1px solid var(--border-subtle); border-radius: 10px; text-align: center; font-size: 14px; margin: 15px 0; }
        .btn-danger-outline { background: rgba(239, 68, 68, 0.05); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); padding: 10px 20px; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>

<div class="main-container">
    <header>
        <h1 id="welcomeMessage">Sistema 4x4</h1>
        <div id="globalCloudStatus">☁️ Cloud Sync</div>
        <button id="logoutBtn">Cerrar Sesión</button>
    </header>

    <div class="auto-panel">
        <input type="date" id="autoFechaInicio">
        <select id="autoTipoPatron">
            <option value="4x4_dia">☀️ 4x4 Día</option>
            <option value="4x4_noche">🌙 4x4 Noche</option>
            <option value="4x4_rotativo">🔄 Rotativo</option>
        </select>
        <button id="autoCompletarBtn">Aplicar Secuencia</button>
    </div>

    <div class="calendar-grid" id="calendarGrid"></div>

    <button class="btn-danger-outline" id="btnEliminarTodo">🗑️ Eliminar Horario Completo</button>
</div>

<div class="modal-overlay" id="editModal">
    <div class="modal-content">
        <h3 id="modalTitle">Configuración</h3>
        <input type="text" class="modal-input" id="modalInputHours" value="00:00 - 00:00">
        <button id="btnCerrarModal">Cancelar</button>
        <button id="btnGuardarModal">Guardar</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    // ... (Tu inicialización de Firebase igual)

    let modoBorrado = false;

    // 1. Lógica de Automatización (Recuperada)
    document.getElementById('autoCompletarBtn').addEventListener('click', async () => {
        const globalCloud = document.getElementById('globalCloudStatus');
        globalCloud.textContent = "⏳ Procesando secuencia...";
        
        const fechaStringInput = document.getElementById('autoFechaInicio').value;
        const tipoPatron = document.getElementById('autoTipoPatron').value;
        
        let secuenciaBase = [];
        if (tipoPatron === "4x4_dia") secuenciaBase = ['D', 'D', 'D', 'D', 'L', 'L', 'L', 'L'];
        else if (tipoPatron === "4x4_noche") secuenciaBase = ['N', 'N', 'N', 'N', 'L', 'L', 'L', 'L'];
        else secuenciaBase = ['D', 'D', 'D', 'D', 'L', 'L', 'L', 'L', 'N', 'N', 'N', 'N', 'L', 'L', 'L', 'L'];

        // (Aquí va tu lógica de bucle for y setDoc que tenías antes)
        globalCloud.textContent = "☁️ Sincronizado";
    });

    // 2. Lógica de Borrado con Modal (Mejorada)
    document.getElementById('btnEliminarTodo').addEventListener('click', () => {
        modoBorrado = true;
        document.getElementById('modalTitle').textContent = "¿Eliminar todo el horario?";
        document.getElementById('modalInputHours').style.display = 'none';
        document.getElementById('editModal').classList.add('active');
    });

    // 3. Botón Guardar / Confirmar
    document.getElementById('btnGuardarModal').addEventListener('click', () => {
        if (modoBorrado) {
            // Lógica de borrado progresivo
            console.log("Borrando todo...");
            modoBorrado = false;
        } else {
            console.log("Guardando turno...");
        }
        document.getElementById('editModal').classList.remove('active');
        document.getElementById('modalInputHours').style.display = 'block';
    });
</script>
</body>
</html>
