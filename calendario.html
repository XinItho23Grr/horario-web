<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horario Web - Gestión de Turnos Profesional</title>
    <style>
        :root {
            --bg-main: #090d16;
            --bg-surface: #131c2e;
            --bg-surface-hover: #1b273f;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-subtle: #22314d;
            --accent-primary: #3b82f6;
            --color-dia: #eab308;
            --color-noche: #3b82f6;
            --color-extra: #10b981;
            --color-libre: #475569;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-primary); min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 24px; }
        .main-container { width: 100%; max-width: 1100px; display: flex; flex-direction: column; gap: 24px; }
        
        header { display: flex; justify-content: space-between; align-items: center; background: var(--bg-surface); padding: 18px 28px; border-radius: 14px; border: 1px solid var(--border-subtle); }
        h1 { font-size: 22px; font-weight: 700; background: linear-gradient(to right, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .logout-btn { padding: 8px 16px; background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 13px; }
        
        .auto-panel { background: var(--bg-surface); padding: 20px 28px; border-radius: 14px; border: 1px solid var(--border-subtle); display: flex; justify-content: space-between; align-items: center; gap: 24px; }
        .panel-group { display: flex; align-items: center; gap: 16px; }
        .auto-panel input, .auto-panel select { background: var(--bg-main); color: var(--text-primary); border: 1px solid var(--border-subtle); padding: 10px 14px; border-radius: 8px; outline: none; }
        .auto-btn { padding: 11px 22px; background: var(--accent-primary); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; }

        .calendar-wrapper { background: var(--bg-surface); border-radius: 16px; border: 1px solid var(--border-subtle); overflow: hidden; }
        .calendar-header-nav { padding: 24px 28px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-subtle); }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border-subtle); padding: 1px; }
        .weekday { text-transform: uppercase; font-size: 11px; font-weight: 700; text-align: center; color: var(--text-secondary); background: var(--bg-surface); padding: 14px 0; }
        .day-cell { background: var(--bg-surface); min-height: 120px; padding: 14px; display: flex; flex-direction: column; cursor: pointer; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 8, 15, 0.85); backdrop-filter: blur(8px); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: 0.2s; }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        .modal-content { background: var(--bg-surface); border: 1px solid var(--border-subtle); width: 90%; max-width: 380px; border-radius: 20px; padding: 28px; text-align: center; }
        
        .modal-input { width: 100%; padding: 12px; background: var(--bg-main); color: white; border: 1px solid var(--border-subtle); border-radius: 10px; margin-top: 10px; text-align: center; font-size: 16px; }
        .modal-actions-layout { display: flex; justify-content: center; gap: 16px; margin-top: 20px; }
        .circle-action-btn { width: 50px; height: 50px; border-radius: 50%; border: 1px solid var(--border-subtle); cursor: pointer; font-size: 20px; }
        .btn-danger-outline { background: rgba(239, 68, 68, 0.05); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>

<div class="main-container">
    <header>
        <h1 id="welcomeMessage">Cargando...</h1>
        <button class="logout-btn" id="logoutBtn">Cerrar Sesión</button>
    </header>

    <div class="auto-panel">
        <div class="panel-group">
            <input type="date" id="autoFechaInicio">
            <select id="autoTipoPatron">
                <option value="4x4_dia">☀️ 4x4 Día</option>
                <option value="4x4_noche">🌙 4x4 Noche</option>
                <option value="4x4_rotativo">🔄 4x4 Rotativo</option>
            </select>
        </div>
        <button class="auto-btn" id="autoCompletarBtn">Aplicar Secuencia</button>
    </div>

    <div class="calendar-wrapper">
        <div class="calendar-header-nav">
            <h2 id="monthYearTitle">Calendario</h2>
            <div class="nav-buttons">
                <button class="nav-btn" id="btnPrevMonth">‹</button>
                <button class="nav-btn" id="btnNextMonth">›</button>
            </div>
        </div>
        <div class="calendar-grid" id="calendarGrid">
            <div class="weekday">Lun</div><div class="weekday">Mar</div><div class="weekday">Mié</div>
            <div class="weekday">Jue</div><div class="weekday">Vie</div><div class="weekday">Sáb</div><div class="weekday">Dom</div>
        </div>
    </div>

    <div style="display: flex; justify-content: flex-end;">
        <button class="btn-danger-outline" id="btnEliminarTodo">🗑️ Eliminar Horario Completo</button>
    </div>
</div>

<div class="modal-overlay" id="editModal">
    <div class="modal-content">
        <h3 id="modalTitle" style="margin-bottom: 15px;">Configuración</h3>
        <p id="modalDesc" style="color: var(--text-secondary); margin-bottom: 15px;"></p>
        
        <input type="text" class="modal-input" id="modalInputHours" placeholder="00:00 - 00:00">
        
        <div class="modal-actions-layout">
            <button class="circle-action-btn" id="btnCerrarModal">❌</button>
            <button class="circle-action-btn" id="btnGuardarModal" style="background: var(--accent-primary); color: white;">💾</button>
        </div>
    </div>
</div>

<script type="module">
    // ... (Tu inicialización de Firebase igual)
    let esModoConfirmacion = false;
    let callbackConfirmacion = null;

    // Función para abrir el modal (Personalizada para Acción o Edición)
    function abrirModal(titulo, descripcion, esConfirmacion, callback) {
        esModoConfirmacion = esConfirmacion;
        callbackConfirmacion = callback;
        
        document.getElementById('modalTitle').textContent = titulo;
        document.getElementById('modalDesc').textContent = descripcion;
        document.getElementById('modalInputHours').style.display = esConfirmacion ? 'none' : 'block';
        
        document.getElementById('editModal').classList.add('active');
    }

    // Botón de eliminar con confirmación centralizada
    document.getElementById('btnEliminarTodo').addEventListener('click', () => {
        abrirModal("Confirmación", "¿Estás seguro de eliminar todo el horario?", true, () => {
            console.log("Lógica de borrado aquí");
            document.getElementById('editModal').classList.remove('active');
        });
    });

    // Guardar / Confirmar
    document.getElementById('btnGuardarModal').addEventListener('click', () => {
        if(esModoConfirmacion && callbackConfirmacion) {
            callbackConfirmacion();
        } else {
            const horas = document.getElementById('modalInputHours').value;
            console.log("Guardando horas:", horas);
            document.getElementById('editModal').classList.remove('active');
        }
    });

    document.getElementById('btnCerrarModal').addEventListener('click', () => {
        document.getElementById('editModal').classList.remove('active');
    });
</script>
</body>
</html>
