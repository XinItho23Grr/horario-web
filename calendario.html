<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horario Web - Mi Calendario 4x4</title>
    <style>
        /* 1. Variables Globales y Paleta de Colores (Modo Oscuro) */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            
            --dia-color: #f59e0b;
            --noche-color: #3b82f6;
            --extra-color: #10b981;
            --libre-color: #475569;
        }

        /* 2. Tipografía y Estilos Generales */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; 
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main);
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            padding: 20px; 
        }

        .main-container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Cabecera de usuario */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--card-bg); 
            padding: 16px 24px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color);
        }

        h1 { 
            font-size: 24px; 
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logout-btn { 
            padding: 8px 16px; 
            background: #ef4444; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            transition: background 0.2s;
        }
        .logout-btn:hover { background: #dc2626; }

        /* Panel de Auto-completado */
        .auto-panel { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .panel-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-grow: 1;
        }

        .panel-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .auto-panel input, .auto-panel select {
            background: #0f172a;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px 14px;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
            width: 100%;
        }

        .auto-btn {
            padding: 10px 20px;
            background: linear-gradient(to right, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.2s;
        }
        .auto-btn:hover { opacity: 0.9; }

        /* Cabecera del Calendario */
        .calendar-header { 
            background: var(--card-bg);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 16px 16px 0 0;
            border: 1px solid var(--border-color);
            border-bottom: none;
        }

        .calendar-header h2 {
            font-size: 20px;
            font-weight: 700;
        }

        /* Leyenda */
        .leyenda {
            background: var(--card-bg);
            padding: 12px 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            font-size: 13px;
            color: var(--text-muted);
        }

        .leyenda-item { display: flex; align-items: center; gap: 8px; }
        .box { width: 16px; height: 16px; border-radius: 4px; }
        .box.dia { background-color: var(--dia-color); }
        .box.noche { background-color: var(--noche-color); }
        .box.extra { background-color: var(--extra-color); }
        .box.libre { background-color: var(--libre-color); }

        /* Cuadrícula del Calendario */
        .calendar-grid { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 8px; 
            background: var(--card-bg);
            padding: 12px;
            border-radius: 0 0 16px 16px;
            border: 1px solid var(--border-color);
            border-top: none;
        }

        .weekday { 
            text-transform: uppercase; 
            font-size: 11px; 
            font-weight: 700; 
            text-align: center; 
            color: var(--text-muted); 
            padding: 8px 0; 
        }

        .weekday:nth-child(6), .weekday:nth-child(7) {
            color: #f43f5e;
        }

        /* Celdas de los Días */
        .day-cell { 
            background: var(--card-bg); 
            min-height: 110px; 
            border-radius: 10px; 
            padding: 12px; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-start; 
            align-items: flex-start;
            border: 1px solid var(--border-color);
            position: relative;
            cursor: pointer;
            transition: transform 0.15s, background-color 0.2s, box-shadow 0.15s;
        }
        .day-cell:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }

        .day-number { 
            font-size: 14px; 
            font-weight: 700; 
            color: var(--text-muted); 
            margin-bottom: 4px;
        }

        .center-space {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            flex-grow: 1;
            gap: 4px;
        }

        .turno-icon { font-size: 26px; }
        .turno-hours { font-size: 11px; font-weight: 700; color: var(--text-muted); text-align: center; }

        /* Clases de estado dinámicas */
        .day-cell.state-dia { background-color: var(--dia-color); }
        .day-cell.state-dia .day-number, .day-cell.state-dia .turno-hours { color: #1e293b; }

        .day-cell.state-noche { background-color: var(--noche-color); }
        .day-cell.state-noche .day-number, .day-cell.state-noche .turno-hours { color: var(--text-main); }

        .day-cell.state-extra { background-color: var(--extra-color); }
        .day-cell.state-extra .day-number, .day-cell.state-extra .turno-hours { color: var(--text-main); }

        .day-cell.state-libre { background-color: var(--libre-color); }
        .day-cell.state-libre .day-number, .day-cell.state-libre .turno-hours { color: var(--text-main); }

        .save-status { font-size: 12px; color: var(--text-muted); font-weight: 600; }

        /* ========================================================
           6. VENTANA MODAL ESTÉTICA E INTERACTIVA
           ======================================================== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(6px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s ease;
        }
        .modal-overlay.active { opacity: 1; pointer-events: auto; }
        
        .modal-content {
            background: #1e293b;
            border: 1px solid var(--border-color);
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            transform: scale(0.95);
            transition: transform 0.2s ease;
            text-align: center;
        }
        .modal-overlay.active .modal-content { transform: scale(1); }
        
        .modal-date-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-main);
            text-transform: capitalize;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 10px;
        }

        /* Contenedores de Modo Vista y Modo Edición */
        .modal-view-mode { display: block; }
        .modal-edit-mode { display: none; }

        .info-display-box {
            background: #0f172a;
            padding: 20px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            margin-bottom: 24px;
        }
        .info-display-icon { font-size: 48px; margin-bottom: 10px; }
        .info-display-name { font-size: 18px; font-weight: 700; color: var(--text-main); margin-bottom: 4px; }
        .info-display-hours { font-size: 14px; color: var(--text-muted); font-weight: 600; }

        .form-label { display: block; text-align: left; font-size: 13px; font-weight: 600; color: var(--text-muted); margin-bottom: 6px; margin-top: 14px; }
        .modal-select, .modal-input { width: 100%; padding: 12px; background: #0f172a; color: var(--text-main); border: 1px solid var(--border-color); border-radius: 10px; font-size: 14px; outline: none; }
        .modal-select { font-weight: 600; }

        /* Botones de acción inferiores */
        .modal-actions-layout {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-top: 10px;
        }

        .circle-action-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: none;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.2);
        }
        .circle-action-btn:hover { transform: scale(1.05); }
        
        .btn-close-x { background: #334155; color: var(--text-main); }
        .btn-edit-pencil { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; }
        .btn-save-disk { background: linear-gradient(135deg, #10b981, #059669); color: white; width: 120px; border-radius: 10px; font-size: 15px; font-weight: 700; gap: 8px; }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .auto-panel { flex-direction: column; align-items: stretch; }
            .panel-group { flex-direction: column; align-items: stretch; gap: 8px; }
            .auto-btn { width: 100%; text-align: center; }
            .day-cell { min-height: 95px; padding: 8px; }
            .turno-icon { font-size: 22px; }
            .turno-hours { font-size: 9px; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <header>
        <h1 id="welcomeMessage">Cargando...</h1>
        <div class="save-status" id="globalCloudStatus">☁️ Sincronizado</div>
        <button class="logout-btn" id="logoutBtn">Cerrar Sesión</button>
    </header>

    <div class="auto-panel">
        <div class="panel-group">
            <label>Empezar en el Día:</label>
            <input type="number" id="autoDiaInicio" min="1" max="31" placeholder="Ej: 1" style="max-width: 70px;">
            <label>Tipo de Patrón:</label>
            <select id="autoTipoPatron">
                <option value="4x4_dia">☀️ 4x4 Solo Día (4D - 4L)</option>
                <option value="4x4_noche">🌙 4x4 Solo Noche (4N - 4L)</option>
                <option value="4x4_rotativo">🔄 4x4 Día y Noche (4D - 4N - 4L)</option>
            </select>
        </div>
        <button class="auto-btn" id="autoCompletarBtn">Aplicar Secuencia</button>
    </div>

    <div>
        <div class="calendar-header">
            <h2>Vista Mensual (31 Días)</h2>
        </div>

        <div class="leyenda">
            <div class="leyenda-item"><div class="box dia"></div> <span>Día</span></div>
            <div class="leyenda-item"><div class="box noche"></div> <span>Noche</span></div>
            <div class="leyenda-item"><div class="box extra"></div> <span>Extra (Reloj)</span></div>
            <div class="leyenda-item"><div class="box libre"></div> <span>Libre</span></div>
        </div>

        <div class="calendar-grid" id="calendarGrid">
            <div class="weekday">Lun</div>
            <div class="weekday">Mar</div>
            <div class="weekday">Mié</div>
            <div class="weekday">Jue</div>
            <div class="weekday">Vie</div>
            <div class="weekday">Sáb</div>
            <div class="weekday">Dom</div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="editModal">
    <div class="modal-content">
        <div class="modal-date-title" id="modalDateTitle">Día 00</div>
        
        <div class="modal-view-mode" id="modalViewContainer">
            <div class="info-display-box">
                <div class="info-display-icon" id="viewIcon">❓</div>
                <div class="info-display-name" id="viewName">Sin Asignar</div>
                <div class="info-display-hours" id="viewHours">--:--</div>
            </div>
            
            <div class="modal-actions-layout">
                <button class="circle-action-btn btn-close-x" id="btnCerrarModal" title="Cerrar">❌</button>
                <button class="circle-action-btn btn-edit-pencil" id="btnActivarEditar" title="Editar Turno">✏️</button>
            </div>
        </div>

        <div class="modal-edit-mode" id="modalEditContainer">
            <label class="form-label">Tipo de Turno</label>
            <select class="modal-select" id="modalSelectTurno">
                <option value="">Sin Asignar</option>
                <option value="D">☀️ Día</option>
                <option value="N">🌙 Noche</option>
                <option value="E">⏰ Extra</option>
                <option value="L">💤 Libre</option>
            </select>

            <label class="form-label">Horas de Trabajo</label>
            <input type="text" class="modal-input" id="modalInputHours" placeholder="Ej: 08:00 - 20:00">

            <div class="modal-actions-layout" style="margin-top: 24px;">
                <button class="circle-action-btn btn-close-x" id="btnCancelarEdicion" title="Volver">❌</button>
                <button class="circle-action-btn btn-save-disk" id="btnGuardarModal">💾 Guardar</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBCu4ytuNDza5MrNGz2Vlb20Mh6xeBCMqk",
      authDomain: "calendario-4x4-f66d7.firebaseapp.com",
      projectId: "calendario-4x4-f66d7",
      storageBucket: "calendario-4x4-f66d7.firebasestorage.app",
      messagingSenderId: "441544580100",
      appId: "1:441544580100:web:7afd53b9933afdf9c36951",
      measurementId: "G-908HDX2J47"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let diaSeleccionadoGlobal = null;

    const infoTurnos = {
        "":  { icon: "❓", name: "Sin Asignar", horas: "Sin asignar", class: "" },
        "D": { icon: "☀️", name: "Turno Día", horas: "08:00 - 20:00", class: "state-dia" },
        "N": { icon: "🌙", name: "Turno Noche", horas: "20:00 - 08:00", class: "state-noche" },
        "E": { icon: "⏰", name: "Turno Extra", horas: "Turno Extra", class: "state-extra" },
        "L": { icon: "💤", name: "Libre / Descanso", horas: "Descanso", class: "state-libre" }
    };

    // Nombres ordenados de días para calcular la cabecera dinámica en español
    const diasSemanaNombres = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('welcomeMessage').textContent = `👋 ¡Hola, ${user.displayName || 'Usuario'}!`;
            generarCalendario();
        } else {
            window.location.href = "index.html";
        }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
        signOut(auth).then(() => { window.location.href = "index.html"; });
    });

    function generarCalendario() {
        const grid = document.getElementById('calendarGrid');
        
        for (let i = 1; i <= 31; i++) {
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            cell.id = `cell-dia-${i}`;
            
            const number = document.createElement('div');
            number.className = 'day-number';
            number.textContent = i;
            
            const centerSpace = document.createElement('div');
            centerSpace.className = 'center-space';
            
            const iconSpan = document.createElement('span');
            iconSpan.className = 'turno-icon';
            iconSpan.id = `icon-dia-${i}`;
            iconSpan.textContent = infoTurnos[""].icon;
            
            const hoursSpan = document.createElement('span');
            hoursSpan.className = 'turno-hours';
            hoursSpan.id = `hours-dia-${i}`;
            hoursSpan.textContent = infoTurnos[""].horas;
            
            centerSpace.appendChild(iconSpan);
            centerSpace.appendChild(hoursSpan);
            
            cell.appendChild(number);
            cell.appendChild(centerSpace);
            grid.appendChild(cell);

            const docRef = doc(db, "usuarios_4x4", currentUser.uid, "turnos", `dia_${i}`);
            getDoc(docRef).then((docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const valorTurno = data.texto || "";
                    const horasCustom = data.horasCustom || "";
                    cell.setAttribute('data-turno', valorTurno);
                    cell.setAttribute('data-horas', horasCustom);
                    actualizarEstilosCelda(cell, iconSpan, hoursSpan, valorTurno, horasCustom);
                }
            });

            cell.addEventListener('click', () => {
                diaSeleccionadoGlobal = i;
                
                // Calcular el día de la semana correspondiente de forma simulada secuencial (asumiendo que inicia el lunes, por ejemplo)
                // O de forma más limpia: calculando basándose en la posición del grid
                const indiceDiaSemana = (i) % 7; 
                const nombresMapeados = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
                // Ajuste simple para que coincida con las columnas estáticas: i=1 -> lunes
                const diasGrid = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];
                const nombreDelDia = diasGrid[i % 7 === 0 ? 6 : (i % 7) - 1];

                abrirModal(nombreDelDia, i, cell.getAttribute('data-turno') || "", cell.getAttribute('data-horas') || "");
            });
        }
    }

    function actualizarEstilosCelda(celda, icono, horas, estado, horasCustom) {
        celda.classList.remove('state-dia', 'state-noche', 'state-extra', 'state-libre');
        const info = infoTurnos[estado] || infoTurnos[""];
        icono.textContent = info.icon;
        horas.textContent = horasCustom ? horasCustom : info.horas;
        if (info.class) {
            celda.classList.add(info.class);
        }
    }

    /* CONTROL DEL MODAL MEJORADO */
    const modal = document.getElementById('editModal');
    const viewContainer = document.getElementById('modalViewContainer');
    const editContainer = document.getElementById('modalEditContainer');
    
    const selectModal = document.getElementById('modalSelectTurno');
    const inputModal = document.getElementById('modalInputHours');

    function abrirModal(nombreDia, numeroDia, turnoActual, horasActuales) {
        // 1. Mostrar título bonito: Ej "Lunes 15"
        document.getElementById('modalDateTitle').textContent = `${nombreDia} ${numeroDia}`;
        
        // 2. Cargar datos del Modo Vista
        const info = infoTurnos[turnoActual] || infoTurnos[""];
        document.getElementById('viewIcon').textContent = info.icon;
        document.getElementById('viewName').textContent = info.name;
        document.getElementById('viewHours').textContent = horasActuales ? horasActuales : info.horas;

        // 3. Dejar los inputs listos en segundo plano
        selectModal.value = turnoActual;
        inputModal.value = horasActuales ? horasActuales : (turnoActual ? info.horas : "");

        // 4. Iniciar SIEMPRE en Modo Vista (como solicitaste)
        viewContainer.style.display = "block";
        editContainer.style.display = "none";
        
        modal.classList.add('active');
    }

    // Activar el modo edición al presionar el Lápiz ✏️
    document.getElementById('btnActivarEditar').addEventListener('click', () => {
        viewContainer.style.display = "none";
        editContainer.style.display = "block";
    });

    // Cancelar la edición y volver a la vista informativa
    document.getElementById('btnCancelarEdicion').addEventListener('click', () => {
        viewContainer.style.display = "block";
        editContainer.style.display = "none";
    });

    // Cerrar el modal por completo con la X de la vista
    document.getElementById('btnCerrarModal').addEventListener('click', cerrarModal);
    function cerrarModal() { modal.classList.remove('active'); }

    // Cambiar las horas automáticamente si seleccionan otro turno en la edición
    selectModal.addEventListener('change', () => {
        const estado = selectModal.value;
        if (estado) { inputModal.value = infoTurnos[estado].horas; }
        else { inputModal.value = ""; }
    });

    // GUARDAR CAMBIOS DESDE EL BOTÓN DISCO (💾)
    document.getElementById('btnGuardarModal').addEventListener('click', () => {
        if (diaSeleccionadoGlobal === null) return;

        const globalCloud = document.getElementById('globalCloudStatus');
        globalCloud.textContent = "⏳ Guardando...";

        const nuevoTurno = selectModal.value;
        const nuevasHoras = inputModal.value;

        const celda = document.getElementById(`cell-dia-${diaSeleccionadoGlobal}`);
        const icono = document.getElementById(`icon-dia-${diaSeleccionadoGlobal}`);
        const horas = document.getElementById(`hours-dia-${diaSeleccionadoGlobal}`);

        celda.setAttribute('data-turno', nuevoTurno);
        celda.setAttribute('data-horas', nuevasHoras);
        actualizarEstilosCelda(celda, icono, horas, nuevoTurno, nuevasHoras);

        setDoc(doc(db, "usuarios_4x4", currentUser.uid, "turnos", `dia_${diaSeleccionadoGlobal}`), {
            texto: nuevoTurno,
            horasCustom: nuevasHoras
        })
        .then(() => { 
            globalCloud.textContent = "☁️ Guardado en nube"; 
            cerrarModal();
        })
        .catch(() => { globalCloud.textContent = "❌ Error"; });
    });

    // Lógica del Autocompletado Secuencial 4x4
    document.getElementById('autoCompletarBtn').addEventListener('click', async () => {
        const diaInicio = parseInt(document.getElementById('autoDiaInicio').value);
        const tipoPatron = document.getElementById('autoTipoPatron').value;

        if (!diaInicio || diaInicio < 1 || diaInicio > 31) {
            alert("Por favor, ingresa un número de día inicial válido (1 al 31).");
            return;
        }

        const globalCloud = document.getElementById('globalCloudStatus');
        globalCloud.textContent = "⏳ Generando patrón...";

        let patron = [];
        if (tipoPatron === "4x4_dia") { patron = ['D', 'D', 'D', 'D', 'L', 'L', 'L', 'L']; }
        else if (tipoPatron === "4x4_noche") { patron = ['N', 'N', 'N', 'N', 'L', 'L', 'L', 'L']; }
        else if (tipoPatron === "4x4_rotativo") { patron = ['D', 'D', 'D', 'D', 'N', 'N', 'N', 'N', 'L', 'L', 'L', 'L']; }

        for (let i = 1; i <= 31; i++) {
            if (i >= diaInicio) {
                const desplazamiento = i - diaInicio;
                const indiceCalculado = desplazamiento % patron.length;
                const turnoAsignado = patron[indiceCalculado];

                await setDoc(doc(db, "usuarios_4x4", currentUser.uid, "turnos", `dia_${i}`), {
                    texto: turnoAsignado,
                    horasCustom: ""
                });
            }
        }

        globalCloud.textContent = "☁️ Sincronizado";
        alert("¡Patrón automatizado guardado con éxito!");
        window.location.reload();
    });
</script>
</body>
</html>
