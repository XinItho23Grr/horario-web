<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horario Web - Gestión de Turnos Profesional</title>
    <style>
        :root {
            --bg-main: #090d16;
            --bg-surface: #131c2e;
            --bg-surface-hover: #1b273f;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --border-subtle: #22314d;
            --accent-primary: #3b82f6;
            --color-dia: #eab308;
            --color-noche: #3b82f6;
            --color-extra: #10b981;
            --color-libre: #475569;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-main); color: var(--text-primary); min-height: 100vh; display: flex; justify-content: center; padding: 24px; }
        .main-container { width: 100%; max-width: 1100px; display: flex; flex-direction: column; gap: 24px; }

        /* Estilos del Calendario */
        header { display: flex; justify-content: space-between; align-items: center; background: var(--bg-surface); padding: 18px 28px; border-radius: 14px; border: 1px solid var(--border-subtle); }
        .auto-panel { background: var(--bg-surface); padding: 20px 28px; border-radius: 14px; border: 1px solid var(--border-subtle); display: flex; justify-content: space-between; align-items: center; gap: 24px; }
        .calendar-wrapper { background: var(--bg-surface); border-radius: 16px; border: 1px solid var(--border-subtle); overflow: hidden; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background: var(--border-subtle); padding: 1px; }
        .day-cell { background: var(--bg-surface); min-height: 120px; padding: 14px; display: flex; flex-direction: column; cursor: pointer; transition: background 0.2s; }
        .day-cell:hover { background-color: var(--bg-surface-hover); }
        .day-number { font-size: 14px; font-weight: 600; color: var(--text-secondary); }
        
        /* Botones */
        .btn-danger-outline { background: rgba(239, 68, 68, 0.05); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: 600; font-size: 13px; }
        .auto-btn { padding: 11px 22px; background: var(--accent-primary); color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 8, 15, 0.85); backdrop-filter: blur(8px); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--bg-surface); padding: 28px; border-radius: 20px; width: 380px; border: 1px solid var(--border-subtle); }
        .modal-input { width: 100%; padding: 12px; background: var(--bg-main); color: var(--text-primary); border: 1px solid var(--border-subtle); border-radius: 10px; }
        
        /* Notificación */
        .toast-notification { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: var(--bg-surface); padding: 16px 32px; border-radius: 14px; border: 1px solid var(--accent-primary); opacity: 0; pointer-events: none; transition: opacity 0.3s; z-index: 2000; }
        .toast-notification.show { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>

<div class="main-container">
    <header>
        <h1 id="welcomeMessage">Calendario 4x4</h1>
        <button class="btn-danger-outline" id="btnEliminarTodo">🗑️ Eliminar Horario</button>
    </header>

    <div class="auto-panel">
        <input type="date" id="autoFechaInicio">
        <select id="autoTipoPatron">
            <option value="4x4_dia">☀️ 4x4 Solo Día</option>
            <option value="4x4_noche">🌙 4x4 Solo Noche</option>
            <option value="4x4_rotativo">🔄 4x4 Día y Noche</option>
        </select>
        <button class="auto-btn" id="autoCompletarBtn">Aplicar Secuencia</button>
    </div>

    <div class="calendar-wrapper">
        <div class="calendar-grid" id="calendarGrid">
            <div class="weekday">Lun</div><div class="weekday">Mar</div><div class="weekday">Mié</div>
            <div class="weekday">Jue</div><div class="weekday">Vie</div><div class="weekday">Sáb</div><div class="weekday">Dom</div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="editModal">
    <div class="modal-content">
        <h3 id="modalDateTitle" style="margin-bottom:20px;">Editar Turno</h3>
        <select class="modal-input" id="modalSelectTurno" style="margin-bottom:15px;">
            <option value="D">☀️ Día</option><option value="N">🌙 Noche</option>
            <option value="E">⏰ Extra</option><option value="L">💤 Libre</option>
        </select>
        <div style="display:flex; gap:10px;">
            <input type="time" class="modal-input" id="modalInputStart">
            <input type="time" class="modal-input" id="modalInputEnd">
        </div>
        <div style="margin-top:20px; display:flex; gap:10px;">
            <button class="btn-danger-outline" id="btnCerrarModal">Cancelar</button>
            <button class="auto-btn" id="btnGuardarModal">Guardar</button>
        </div>
    </div>
</div>

<div class="toast-notification" id="centerToast">✨ <span id="toastMessage">Procesando...</span></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = { /* Tu config aquí */ };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    let fechaSeleccionada = "";

    function showToast(msg) {
        const toast = document.getElementById('centerToast');
        document.getElementById('toastMessage').textContent = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    document.getElementById('autoCompletarBtn').addEventListener('click', async () => {
        const fechaInicio = new Date(document.getElementById('autoFechaInicio').value + "T00:00:00");
        const tipo = document.getElementById('autoTipoPatron').value;
        const ciclos = {
            '4x4_dia': ['D','D','D','D','L','L','L','L'],
            '4x4_noche': ['N','N','N','N','L','L','L','L'],
            '4x4_rotativo': ['D','D','D','D','L','L','L','L','N','N','N','N','L','L','L','L']
        };
        
        const secuencia = ciclos[tipo];
        for(let i=0; i<180; i++) {
            let fecha = new Date(fechaInicio);
            fecha.setDate(fecha.getDate() + i);
            let clave = fecha.toISOString().split('T')[0];
            await setDoc(doc(db, "usuarios_4x4", auth.currentUser.uid, "turnos", clave), {
                texto: secuencia[i % secuencia.length],
                horasCustom: ""
            });
        }
        showToast("Secuencia aplicada correctamente");
        location.reload();
    });

    document.getElementById('btnEliminarTodo').addEventListener('click', async () => {
        if(confirm("¿Seguro que quieres borrar todo?")) {
            // Lógica para borrar los próximos 180 días en Firebase
            showToast("Horario eliminado");
            location.reload();
        }
    });
    
    // ... El resto de la lógica de renderizado y modal se mantiene igual ...
</script>
</body>
</html>
