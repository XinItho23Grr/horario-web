<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horario Web - Mi Calendario 4x4</title>
    <style>
        /* 1. Variables Globales y Paleta de Colores (Modo Oscuro) */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            
            --dia-color: #f59e0b;
            --noche-color: #3b82f6;
            --extra-color: #10b981;
            --libre-color: #475569;
        }

        /* 2. Tipografía y Estilos Generales */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; 
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main);
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            padding: 20px; 
        }

        .main-container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Cabecera de usuario */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--card-bg); 
            padding: 16px 24px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color);
        }

        h1 { 
            font-size: 24px; 
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logout-btn { 
            padding: 8px 16px; 
            background: #ef4444; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            transition: background 0.2s;
        }
        .logout-btn:hover { background: #dc2626; }

        /* Panel de Auto-completado */
        .auto-panel { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .panel-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-grow: 1;
        }

        .panel-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .auto-panel input, .auto-panel select {
            background: #0f172a;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px 14px;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
            width: 100%;
        }

        .auto-btn {
            padding: 10px 20px;
            background: linear-gradient(to right, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.2s;
        }
        .auto-btn:hover { opacity: 0.9; }

        /* Cabecera del Calendario */
        .calendar-header { 
            background: var(--card-bg);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 16px 16px 0 0;
            border: 1px solid var(--border-color);
            border-bottom: none;
        }

        .calendar-header h2 {
            font-size: 20px;
            font-weight: 700;
        }

        /* Leyenda */
        .leyenda {
            background: var(--card-bg);
            padding: 12px 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            font-size: 13px;
            color: var(--text-muted);
        }

        .leyenda-item { display: flex; align-items: center; gap: 8px; }
        .box { width: 16px; height: 16px; border-radius: 4px; }
        .box.dia { background-color: var(--dia-color); }
        .box.noche { background-color: var(--noche-color); }
        .box.extra { background-color: var(--extra-color); }
        .box.libre { background-color: var(--libre-color); }

        /* 4. La Cuadrícula del Calendario */
        .calendar-grid { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 8px; 
            background: var(--card-bg);
            padding: 12px;
            border-radius: 0 0 16px 16px;
            border: 1px solid var(--border-color);
            border-top: none;
        }

        .weekday { 
            text-transform: uppercase; 
            font-size: 11px; 
            font-weight: 700; 
            text-align: center; 
            color: var(--text-muted); 
            padding: 8px 0; 
        }

        .weekday:nth-child(6), .weekday:nth-child(7) {
            color: #f43f5e;
        }

        /* Celdas de los Días */
        .day-cell { 
            background: var(--card-bg); 
            min-height: 110px; 
            border-radius: 10px; 
            padding: 12px; 
            display: flex; 
            flex-direction: column; 
            justify-content: flex-start; 
            align-items: flex-start;
            border: 1px solid var(--border-color);
            position: relative;
            cursor: pointer;
            transition: transform 0.15s, background-color 0.2s, box-shadow 0.15s;
        }
        .day-cell:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }

        .day-number { 
            font-size: 14px; 
            font-weight: 700; 
            color: var(--text-muted); 
            margin-bottom: 4px;
        }

        /* Espacio central */
        .center-space {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            flex-grow: 1;
            gap: 4px;
        }

        .turno-icon { font-size: 26px; }
        .turno-hours { font-size: 11px; font-weight: 700; color: var(--text-muted); text-align: center; }

        /* Clases de estado dinámicas */
        .day-cell.state-dia { background-color: var(--dia-color); }
        .day-cell.state-dia .day-number, .day-cell.state-dia .turno-hours { color: #1e293b; }

        .day-cell.state-noche { background-color: var(--noche-color); }
        .day-cell.state-noche .day-number, .day-cell.state-noche .turno-hours { color: var(--text-main); }

        .day-cell.state-extra { background-color: var(--extra-color); }
        .day-cell.state-extra .day-number, .day-cell.state-extra .turno-hours { color: var(--text-main); }

        .day-cell.state-libre { background-color: var(--libre-color); }
        .day-cell.state-libre .day-number, .day-cell.state-libre .turno-hours { color: var(--text-main); }

        .save-status { font-size: 12px; color: var(--text-muted); font-weight: 600; }

        /* ========================================================
           6. VENTANA MODAL EMERGENTE (AL MEDIO)
           ======================================================== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0; pointer-events: none;
            transition: opacity 0.2s ease;
        }
        .modal-overlay.active {
            opacity: 1; pointer-events: auto;
        }
        .modal-content {
            background: #1e293b;
            border: 1px solid var(--border-color);
            width: 90%;
            max-width: 450px;
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3);
            transform: scale(0.95);
            transition: transform 0.2s ease;
        }
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-header h3 { font-size: 18px; font-weight: 700; color: var(--text-main); }
        .close-modal-btn {
            background: transparent; border: none; color: var(--text-muted);
            font-size: 20px; cursor: pointer;
        }
        .close-modal-btn:hover { color: #ef4444; }

        .form-label {
            display: block; font-size: 13px; font-weight: 600;
            color: var(--text-muted); margin-bottom: 8px; margin-top: 16px;
        }
        .modal-select {
            width: 100%; padding: 10px; background: #0f172a;
            color: var(--text-main); border: 1px solid var(--border-color);
            border-radius: 8px; font-size: 14px; font-weight: 600; outline: none;
        }
        .modal-input {
            width: 100%; padding: 10px; background: #0f172a;
            color: var(--text-main); border: 1px solid var(--border-color);
            border-radius: 8px; font-size: 14px; outline: none;
        }

        .modal-actions {
            display: flex; justify-content: flex-end; gap: 12px; margin-top: 24px;
        }
        .btn-cancelar {
            padding: 10px 16px; background: #334155; color: var(--text-main);
            border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
        }
        .btn-guardar {
            padding: 10px 20px; background: #2563eb; color: white;
            border: none; border-radius: 8px; font-weight: 600; cursor: pointer;
        }
        .btn-guardar:hover { background: #1d4ed8; }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .auto-panel { flex-direction: column; align-items: stretch; }
            .panel-group { flex-direction: column; align-items: stretch; gap: 8px; }
            .auto-btn { width: 100%; text-align: center; }
            .day-cell { min-height: 95px; padding: 8px; }
            .turno-icon { font-size: 22px; }
            .turno-hours { font-size: 9px; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <header>
        <h1 id="welcomeMessage">Cargando...</h1>
        <div class="save-status" id="globalCloudStatus">☁️ Sincronizado</div>
        <button class="logout-btn" id="logoutBtn">Cerrar Sesión</button>
    </header>

    <div class="auto-panel">
        <div class="panel-group">
            <label>Auto-completar desde el Día:</label>
            <input type="number" id="autoDiaInicio" min="1" max="31" placeholder="Ej: 1" style="max-width: 80px;">
            <label>Turno Inicial:</label>
            <select id="autoTurnoInicial">
                <option value="D">☀️ Día (D)</option>
                <option value="N">🌙 Noche (N)</option>
                <option value="L">💤 Libre (L)</option>
                <option value="E">⏰ Extra (E)</option>
            </select>
        </div>
        <button class="auto-btn" id="autoCompletarBtn">Aplicar Patrón 4x4</button>
    </div>

    <div>
        <div class="calendar-header">
            <h2>Vista Mensual (31 Días)</h2>
        </div>

        <div class="leyenda">
            <div class="leyenda-item"><div class="box dia"></div> <span>Día</span></div>
            <div class="leyenda-item"><div class="box noche"></div> <span>Noche</span></div>
            <div class="leyenda-item"><div class="box extra"></div> <span>Extra (Reloj)</span></div>
            <div class="leyenda-item"><div class="box libre"></div> <span>Libre</span></div>
        </div>

        <div class="calendar-grid" id="calendarGrid">
            <div class="weekday">Lun</div>
            <div class="weekday">Mar</div>
            <div class="weekday">Mié</div>
            <div class="weekday">Jue</div>
            <div class="weekday">Vie</div>
            <div class="weekday">Sáb</div>
            <div class="weekday">Dom</div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="editModal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalTitle">Editar Día</h3>
            <button class="close-modal-btn" id="closeModalX">&times;</button>
        </div>
        
        <label class="form-label">Tipo de Turno</label>
        <select class="modal-select" id="modalSelectTurno">
            <option value="">Sin Asignar</option>
            <option value="D">☀️ Día</option>
            <option value="N">🌙 Noche</option>
            <option value="E">⏰ Extra</option>
            <option value="L">💤 Libre</option>
        </select>

        <label class="form-label">Horas de Trabajo (Opcional)</label>
        <input type="text" class="modal-input" id="modalInputHours" placeholder="Ej: 08:00 - 20:00 o Personalizado">

        <div class="modal-actions">
            <button class="btn-cancelar" id="btnCancelarModal">Cancelar</button>
            <button class="btn-guardar" id="btnGuardarModal">Guardar en Nube</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBCu4ytuNDza5MrNGz2Vlb20Mh6xeBCMqk",
      authDomain: "calendario-4x4-f66d7.firebaseapp.com",
      projectId: "calendario-4x4-f66d7",
      storageBucket: "calendario-4x4-f66d7.firebasestorage.app",
      messagingSenderId: "441544580100",
      appId: "1:441544580100:web:7afd53b9933afdf9c36951",
      measurementId: "G-908HDX2J47"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;
    let diaSeleccionadoGlobal = null; // Guarda qué número de día se está editando en la ventana modal

    const infoTurnos = {
        "":  { icon: "❓", horas: "Sin asignar", class: "" },
        "D": { icon: "☀️", horas: "08:00 - 20:00", class: "state-dia" },
        "N": { icon: "🌙", horas: "20:00 - 08:00", class: "state-noche" },
        "E": { icon: "⏰", horas: "Turno Extra", class: "state-extra" },
        "L": { icon: "💤", horas: "Descanso", class: "state-libre" }
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('welcomeMessage').textContent = `👋 ¡Hola, ${user.displayName || 'Usuario'}!`;
            generarCalendario();
        } else {
            window.location.href = "index.html";
        }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
        signOut(auth).then(() => { window.location.href = "index.html"; });
    });

    function generarCalendario() {
        const grid = document.getElementById('calendarGrid');
        
        for (let i = 1; i <= 31; i++) {
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            cell.id = `cell-dia-${i}`;
            
            const number = document.createElement('div');
            number.className = 'day-number';
            number.textContent = i;
            
            const centerSpace = document.createElement('div');
            centerSpace.className = 'center-space';
            
            const iconSpan = document.createElement('span');
            iconSpan.className = 'turno-icon';
            iconSpan.id = `icon-dia-${i}`;
            iconSpan.textContent = infoTurnos[""].icon;
            
            const hoursSpan = document.createElement('span');
            hoursSpan.className = 'turno-hours';
            hoursSpan.id = `hours-dia-${i}`;
            hoursSpan.textContent = infoTurnos[""].horas;
            
            centerSpace.appendChild(iconSpan);
            centerSpace.appendChild(hoursSpan);
            
            cell.appendChild(number);
            cell.appendChild(centerSpace);
            grid.appendChild(cell);

            // Cargar datos iniciales desde Firestore
            const docRef = doc(db, "usuarios_4x4", currentUser.uid, "turnos", `dia_${i}`);
            getDoc(docRef).then((docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const valorTurno = data.texto || "";
                    const horasCustom = data.horasCustom || "";
                    cell.setAttribute('data-turno', valorTurno);
                    cell.setAttribute('data-horas', horasCustom);
                    actualizarEstilosCelda(cell, iconSpan, hoursSpan, valorTurno, horasCustom);
                }
            });

            // AL HACER CLICK EN EL CUADRO: Abrir la ventana modal del medio
            cell.addEventListener('click', () => {
                diaSeleccionadoGlobal = i;
                abrirModal(i, cell.getAttribute('data-turno') || "", cell.getAttribute('data-horas') || "");
            });
        }
    }

    function actualizarEstilosCelda(celda, icono, horas, estado, horasCustom) {
        celda.classList.remove('state-dia', 'state-noche', 'state-extra', 'state-libre');
        const info = infoTurnos[estado] || infoTurnos[""];
        icono.textContent = info.icon;
        horas.textContent = horasCustom ? horasCustom : info.horas;
        if (info.class) {
            celda.classList.add(info.class);
        }
    }

    /* ========================================================
       LÓGICA DE CONTROL DEL MODAL EMERGENTE
       ======================================================== */
    const modal = document.getElementById('editModal');
    const selectModal = document.getElementById('modalSelectTurno');
    const inputModal = document.getElementById('modalInputHours');

    function abrirModal(numeroDia, turnoActual, horasActuales) {
        document.getElementById('modalTitle').textContent = `Configurar Día ${numeroDia}`;
        selectModal.value = turnoActual;
        
        // Si no tiene horas personalizadas, sugerir la por defecto del turno al cambiarlo
        inputModal.value = horasActuales;
        modal.classList.add('active');
    }

    // Cerrar Modal al dar Cancelar o en la X
    document.getElementById('closeModalX').addEventListener('click', cerrarModal);
    document.getElementById('btnCancelarModal').addEventListener('click', cerrarModal);
    
    function cerrarModal() {
        modal.classList.remove('active');
    }

    // Auto-rellenar input de horas al cambiar la opción en la ventana modal
    selectModal.addEventListener('change', () => {
        const estado = selectModal.value;
        if (estado && !inputModal.value) {
            inputModal.value = infoTurnos[estado].horas;
        } else if (!estado) {
            inputModal.value = "";
        }
    });

    // GUARDAR CAMBIOS DESDE LA MODAL
    document.getElementById('btnGuardarModal').addEventListener('click', () => {
        if (diaSeleccionadoGlobal === null) return;

        const globalCloud = document.getElementById('globalCloudStatus');
        globalCloud.textContent = "⏳ Guardando...";

        const nuevoTurno = selectModal.value;
        const nuevasHoras = inputModal.value;

        // Buscar elementos de la celda afectada en la cuadrícula
        const celda = document.getElementById(`cell-dia-${diaSeleccionadoGlobal}`);
        const icono = document.getElementById(`icon-dia-${diaSeleccionadoGlobal}`);
        const horas = document.getElementById(`hours-dia-${diaSeleccionadoGlobal}`);

        // Actualizar atributos de datos y diseño visual en tiempo real
        celda.setAttribute('data-turno', nuevoTurno);
        celda.setAttribute('data-horas', nuevasHoras);
        actualizarEstilosCelda(celda, icono, horas, nuevoTurno, nuevasHoras);

        // Subir cambios exactos a Firestore usando tus rutas nativas `dia_X`
        setDoc(doc(db, "usuarios_4x4", currentUser.uid, "turnos", `dia_${diaSeleccionadoGlobal}`), {
            texto: nuevoTurno,
            horasCustom: nuevasHoras
        })
        .then(() => { 
            globalCloud.textContent = "☁️ Guardado en nube"; 
            cerrarModal();
        })
        .catch(() => { 
            globalCloud.textContent = "❌ Error"; 
        });
    });

    // Lógica del Autocompletado Secuencial 4x4
    document.getElementById('autoCompletarBtn').addEventListener('click', async () => {
        const diaInicio = parseInt(document.getElementById('autoDiaInicio').value);
        const turnoInicial = document.getElementById('autoTurnoInicial').value;

        if (!diaInicio || diaInicio < 1 || diaInicio > 31) {
            alert("Por favor, ingresa un número de día válido entre 1 y 31.");
            return;
        }

        const globalCloud = document.getElementById('globalCloudStatus');
        globalCloud.textContent = "⏳ Autocompletando patrón...";

        const patron = ['D','D','D','D','N','N','N','N','L','L','L','L'];
        let indiceCiclo = patron.indexOf(turnoInicial);

        for (let i = 1; i <= 31; i++) {
            if (i >= diaInicio) {
                const desplazamiento = i - diaInicio;
                const indiceCalculado = (indiceCiclo + desplazamiento) % patron.length;
                const turnoAsignado = patron[indiceCalculado];

                await setDoc(doc(db, "usuarios_4x4", currentUser.uid, "turnos", `dia_${i}`), {
                    texto: turnoAsignado,
                    horasCustom: ""
                });
            }
        }

        globalCloud.textContent = "☁️ Sincronizado";
        alert("¡Patrón rotativo 4x4 aplicado perfectamente!");
        window.location.reload();
    });
</script>
</body>
</html>
