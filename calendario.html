<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horario Web - Mi Calendario</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #f8fafc; min-height: 100vh; padding: 20px; color: #1e293b; }
        header { max-width: 900px; margin: 0 auto 20px auto; display: flex; justify-content: space-between; align-items: center; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { font-size: 22px; color: #4f46e5; }
        .logout-btn { padding: 8px 16px; background: #ef4444; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; }
        .logout-btn:hover { background: #dc2626; }
        .calendar-container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 16px; box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-top: 20px; }
        .day-header { font-weight: 600; text-align: center; color: #64748b; padding: 10px 0; border-bottom: 2px solid #e2e8f0; }
        .day-cell { background: #f1f5f9; min-height: 120px; border-radius: 8px; padding: 8px; display: flex; flex-direction: column; justify-content: space-between; transition: background 0.2s; }
        .day-cell:hover { background: #e2e8f0; }
        .day-number { font-weight: 600; color: #475569; margin-bottom: 5px; }
        textarea { width: 100%; flex-grow: 1; border: none; background: transparent; resize: none; font-size: 13px; outline: none; color: #334155; }
        .save-status { text-align: right; font-size: 11px; color: #94a3b8; margin-top: 4px; }
    </style>
</head>
<body>

<header>
    <h1 id="welcomeMessage">Cargando...</h1>
    <button class="logout-btn" id="logoutBtn">Cerrar Sesión</button>
</header>

<div class="calendar-container">
    <h2 style="text-align: center; color: #334155;">Vista Mensual</h2>
    <div class="grid" id="calendarGrid">
        <div class="day-header">Lun</div>
        <div class="day-header">Mar</div>
        <div class="day-header">Mié</div>
        <div class="day-header">Jue</div>
        <div class="day-header">Vie</div>
        <div class="day-header">Sáb</div>
        <div class="day-header">Dom</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBCu4ytuNDza5MrNGz2Vlb20Mh6xeBCMqk",
      authDomain: "calendario-4x4-f66d7.firebaseapp.com",
      projectId: "calendario-4x4-f66d7",
      storageBucket: "calendario-4x4-f66d7.firebasestorage.app",
      messagingSenderId: "441544580100",
      appId: "1:441544580100:web:7afd53b9933afdf9c36951",
      measurementId: "G-908HDX2J47"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('welcomeMessage').textContent = `👋 ¡Hola, ${user.displayName || 'Usuario'}!`;
            generarCalendario();
        } else {
            window.location.href = "index.html";
        }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
        signOut(auth).then(() => { window.location.href = "index.html"; });
    });

    function generarCalendario() {
        const grid = document.getElementById('calendarGrid');
        
        for (let i = 1; i <= 31; i++) {
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            
            const number = document.createElement('div');
            number.className = 'day-number';
            number.textContent = i;
            
            const textarea = document.createElement('textarea');
            textarea.placeholder = "Escribe tu turno...";
            textarea.id = `day-${i}`;
            
            const status = document.createElement('div');
            status.className = 'save-status';
            status.id = `status-${i}`;
            status.textContent = "Sin cambios";
            
            cell.appendChild(number);
            cell.appendChild(textarea);
            cell.appendChild(status);
            grid.appendChild(cell);

            const docRef = doc(db, "usuarios_4x4", currentUser.uid, "turnos", `dia_${i}`);
            getDoc(docRef).then((docSnap) => {
                if (docSnap.exists()) {
                    textarea.value = docSnap.data().texto || "";
                    status.textContent = "Guardado en nube";
                }
            });

            textarea.addEventListener('blur', () => {
                status.textContent = "Guardando...";
                setDoc(doc(db, "usuarios_4x4", currentUser.uid, "turnos", `dia_${i}`), {
                    texto: textarea.value
                })
                .then(() => { status.textContent = "Guardado en nube"; })
                .catch(() => { status.textContent = "Error al guardar"; });
            });
        }
    }
</script>
</body>
</html>
