<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horario Web - Mi Calendario 4x4</title>
    <style>
        /* 1. Variables Globales y Paleta de Colores (Modo Oscuro) */
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            
            --dia-color: #f59e0b;
            --noche-color: #3b82f6;
            --extra-color: #10b981;
            --libre-color: #475569;
        }

        /* 2. Tipografía y Estilos Generales */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; 
        }

        body { 
            background-color: var(--bg-color); 
            color: var(--text-main);
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: flex-start; 
            padding: 20px; 
        }

        .main-container {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* Cabecera de usuario */
        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: var(--card-bg); 
            padding: 16px 24px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color);
        }

        h1 { 
            font-size: 24px; 
            font-weight: 800;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logout-btn { 
            padding: 8px 16px; 
            background: #ef4444; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 600; 
            transition: background 0.2s;
        }
        .logout-btn:hover { background: #dc2626; }

        /* Panel de Auto-completado */
        .auto-panel { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 12px; 
            border: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .panel-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-grow: 1;
        }

        .panel-group label {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            white-space: nowrap;
        }

        .auto-panel input, .auto-panel select {
            background: #0f172a;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px 14px;
            border-radius: 8px;
            outline: none;
            font-size: 14px;
            width: 100%;
        }

        .auto-btn {
            padding: 10px 20px;
            background: linear-gradient(to right, #2563eb, #1d4ed8);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.2s;
        }
        .auto-btn:hover { opacity: 0.9; }

        /* Cabecera del Calendario */
        .calendar-header { 
            background: var(--card-bg);
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 16px 16px 0 0;
            border: 1px solid var(--border-color);
            border-bottom: none;
        }

        .calendar-header h2 {
            font-size: 20px;
            font-weight: 700;
        }

        /* Leyenda */
        .leyenda {
            background: var(--card-bg);
            padding: 12px 20px;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            font-size: 13px;
            color: var(--text-muted);
        }

        .leyenda-item { display: flex; align-items: center; gap: 8px; }
        .box { width: 16px; height: 16px; border-radius: 4px; }
        .box.dia { background-color: var(--dia-color); }
        .box.noche { background-color: var(--noche-color); }
        .box.extra { background-color: var(--extra-color); }
        .box.libre { background-color: var(--libre-color); }

        /* 4. La Cuadrícula del Calendario */
        .calendar-grid { 
            display: grid; 
            grid-template-columns: repeat(7, 1fr); 
            gap: 8px; 
            background: var(--card-bg);
            padding: 12px;
            border-radius: 0 0 16px 16px;
            border: 1px solid var(--border-color);
            border-top: none;
        }

        .weekday { 
            text-transform: uppercase; 
            font-size: 11px; 
            font-weight: 700; 
            text-align: center; 
            color: var(--text-muted); 
            padding: 8px 0; 
        }

        .weekday:nth-child(6), .weekday:nth-child(7) {
            color: #f43f5e;
        }

        /* Celdas de los Días */
        .day-cell { 
            background: var(--card-bg); 
            min-height: 125px; 
            border-radius: 10px; 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            justify-content: space-between; 
            border: 1px solid var(--border-color);
            position: relative;
            transition: transform 0.15s, background-color 0.2s;
        }
        .day-cell:hover {
            transform: translateY(-2px);
        }

        .cell-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        .day-number { 
            font-size: 14px; 
            font-weight: 700; 
            color: var(--text-muted); 
        }

        /* Botón de configuración de horas */
        .edit-hours-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 12px;
            padding: 2px;
            border-radius: 4px;
            transition: color 0.2s;
        }
        .edit-hours-btn:hover {
            color: var(--text-main);
        }

        /* Espacio central */
        .center-space {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex-grow: 1;
            gap: 4px;
            margin: 4px 0;
        }

        .turno-icon { font-size: 24px; }
        .turno-hours { font-size: 11px; font-weight: 700; color: var(--text-muted); text-align: center; }

        /* Selector integrado inferior */
        .select-turno { 
            width: 100%; 
            padding: 6px; 
            background: #0f172a; 
            color: var(--text-main); 
            border: 1px solid var(--border-color); 
            border-radius: 6px; 
            font-size: 12px; 
            font-weight: 600;
            outline: none; 
            cursor: pointer;
        }

        /* Clases de estado dinámicas */
        .day-cell.state-dia { background-color: var(--dia-color); }
        .day-cell.state-dia .day-number, .day-cell.state-dia .turno-hours, .day-cell.state-dia .edit-hours-btn { color: #1e293b; }
        .day-cell.state-dia .select-turno { background: rgba(255, 255, 255, 0.25); color: #1e293b; border-color: rgba(0,0,0,0.1); }

        .day-cell.state-noche { background-color: var(--noche-color); }
        .day-cell.state-noche .day-number, .day-cell.state-noche .turno-hours { color: var(--text-main); }
        .day-cell.state-noche .select-turno { background: rgba(0, 0, 0, 0.3); color: var(--text-main); border-color: rgba(255,255,255,0.1); }

        .day-cell.state-extra { background-color: var(--extra-color); }
        .day-cell.state-extra .day-number, .day-cell.state-extra .turno-hours { color: var(--text-main); }
        .day-cell.state-extra .select-turno { background: rgba(0, 0, 0, 0.3); color: var(--text-main); border-color: rgba(255,255,255,0.1); }

        .day-cell.state-libre { background-color: var(--libre-color); }
        .day-cell.state-libre .day-number, .day-cell.state-libre .turno-hours { color: var(--text-main); }
        .day-cell.state-libre .select-turno { background: rgba(0, 0, 0, 0.3); color: var(--text-main); border-color: rgba(255,255,255,0.1); }

        .save-status { font-size: 12px; color: var(--text-muted); font-weight: 600; }

        @media (max-width: 768px) {
            body { padding: 10px; }
            .auto-panel { flex-direction: column; align-items: stretch; }
            .panel-group { flex-direction: column; align-items: stretch; gap: 8px; }
            .auto-btn { width: 100%; text-align: center; }
            .day-cell { min-height: 110px; padding: 6px; }
            .turno-icon { font-size: 20px; }
            .turno-hours { font-size: 10px; }
        }
    </style>
</head>
<body>

<div class="main-container">
    <header>
        <h1 id="welcomeMessage">Cargando...</h1>
        <div class="save-status" id="globalCloudStatus">☁️ Sincronizado</div>
        <button class="logout-btn" id="logoutBtn">Cerrar Sesión</button>
    </header>

    <div class="auto-panel">
        <div class="panel-group">
            <label>Auto-completar desde el Día:</label>
            <input type="number" id="autoDiaInicio" min="1" max="31" placeholder="Ej: 1" style="max-width: 80px;">
            <label>Turno Inicial:</label>
            <select id="autoTurnoInicial">
                <option value="D">☀️ Día (D)</option>
                <option value="N">🌙 Noche (N)</option>
                <option value="L">💤 Libre (L)</option>
                <option value="E">⏰ Extra (E)</option>
            </select>
        </div>
        <button class="auto-btn" id="autoCompletarBtn">Aplicar Patrón 4x4</button>
    </div>

    <div>
        <div class="calendar-header">
            <h2>Vista Mensual (31 Días)</h2>
        </div>

        <div class="leyenda">
            <div class="leyenda-item"><div class="box dia"></div> <span>Día</span></div>
            <div class="leyenda-item"><div class="box noche"></div> <span>Noche</span></div>
            <div class="leyenda-item"><div class="box extra"></div> <span>Extra (Reloj)</span></div>
            <div class="leyenda-item"><div class="box libre"></div> <span>Libre</span></div>
        </div>

        <div class="calendar-grid" id="calendarGrid">
            <div class="weekday">Lun</div>
            <div class="weekday">Mar</div>
            <div class="weekday">Mié</div>
            <div class="weekday">Jue</div>
            <div class="weekday">Vie</div>
            <div class="weekday">Sáb</div>
            <div class="weekday">Dom</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBCu4ytuNDza5MrNGz2Vlb20Mh6xeBCMqk",
      authDomain: "calendario-4x4-f66d7.firebaseapp.com",
      projectId: "calendario-4x4-f66d7",
      storageBucket: "calendario-4x4-f66d7.firebasestorage.app",
      messagingSenderId: "441544580100",
      appId: "1:441544580100:web:7afd53b9933afdf9c36951",
      measurementId: "G-908HDX2J47"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let currentUser = null;

    // Configuración visual por turno (Modificado a Reloj ⏰ en Extra)
    const infoTurnos = {
        "":  { icon: "❓", horas: "Sin asignar", class: "" },
        "D": { icon: "☀️", horas: "08:00 - 20:00", class: "state-dia" },
        "N": { icon: "🌙", horas: "20:00 - 08:00", class: "state-noche" },
        "E": { icon: "⏰", horas: "Turno Extra", class: "state-extra" },
        "L": { icon: "💤", horas: "Descanso", class: "state-libre" }
    };

    onAuthStateChanged(auth, (user) => {
        if (user) {
            currentUser = user;
            document.getElementById('welcomeMessage').textContent = `👋 ¡Hola, ${user.displayName || 'Usuario'}!`;
            generarCalendario();
        } else {
            window.location.href = "index.html";
        }
    });

    document.getElementById('logoutBtn').addEventListener('click', () => {
        signOut(auth).then(() => { window.location.href = "index.html"; });
    });

    function generarCalendario() {
        const grid = document.getElementById('calendarGrid');
        
        for (let i = 1; i <= 31; i++) {
            const cell = document.createElement('div');
            cell.className = 'day-cell';
            
            const topBar = document.createElement('div');
            topBar.className = 'cell-top';

            const number = document.createElement('div');
            number.className = 'day-number';
            number.textContent = i;
            
            const editBtn = document.createElement('button');
            editBtn.className = 'edit-hours-btn';
            editBtn.textContent = "⚙️";
            editBtn.title = "Cambiar horas de trabajo";

            topBar.appendChild(number);
            topBar.appendChild(editBtn);

            const centerSpace = document.createElement('div');
            centerSpace.className = 'center-space';
            
            const iconSpan = document.createElement('span');
            iconSpan.className = 'turno-icon';
            iconSpan.textContent = infoTurnos[""].icon;
            
            const hoursSpan = document.createElement('span');
            hoursSpan.className = 'turno-hours';
            hoursSpan.textContent = infoTurnos[""].horas;
            
            centerSpace.appendChild(iconSpan);
            centerSpace.appendChild(hoursSpan);

            const select = document.createElement('select');
            select.className = 'select-turno';
            select.innerHTML = `
                <option value="">Seleccionar...</option>
                <option value="D">☀️ Día</option>
                <option value="N">🌙 Noche</option>
                <option value="E">⏰ Extra</option>
                <option value="L">💤 Libre</option>
            `;
            
            cell.appendChild(topBar);
            cell.appendChild(centerSpace);
            cell.appendChild(select);
            grid.appendChild(cell);

            // Cargar datos (Turno y Horas personalizadas si existen)
            const docRef = doc(db, "usuarios_4x4", currentUser.uid, "turnos", `dia_${i}`);
            getDoc(docRef).then((docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    const valorTurno = data.texto || "";
                    const horasPersonalizadas = data.horasCustom || "";
                    
                    select.value = valorTurno;
                    actualizarEstilosCelda(cell, iconSpan, hoursSpan, valorTurno, horasPersonalizadas);
                }
            });

            // Guardar al cambiar el tipo de turno
            select.addEventListener('change', () => {
                const globalCloud = document.getElementById('globalCloudStatus');
                globalCloud.textContent = "⏳ Guardando...";
                
                const valorSeleccionado = select.value;
                actualizarEstilosCelda(cell, iconSpan, hoursSpan, valorSeleccionado, "");

                setDoc(doc(db, "usuarios_4x4", currentUser.uid, "turnos", `dia_${i}`), {
                    texto: valorSeleccionado,
                    horasCustom: "" // Se reinicia al cambiar el tipo de turno
                })
                .then(() => { globalCloud.textContent = "☁️ Guardado en nube"; })
                .catch(() => { globalCloud.textContent = "❌ Error"; });
            });

            // Botón de engranaje para modificar las horas de trabajo a mano
            editBtn.addEventListener('click', () => {
                if (!select.value) {
                    alert("Primero selecciona un tipo de turno para este día.");
                    return;
                }
                const horaActualTexto = hoursSpan.textContent;
                const nuevaHora = prompt(`Cambiar horas del día ${i} (${select.value}):`, horaActualTexto);
                
                if (nuevaHora !== null) {
                    const globalCloud = document.getElementById('globalCloudStatus');
                    globalCloud.textContent = "⏳ Guardando horas...";
                    
                    hoursSpan.textContent = nuevaHora;

                    setDoc(doc(db, "usuarios_4x4", currentUser.uid, "turnos", `dia_${i}`), {
                        texto: select.value,
                        horasCustom: nuevaHora
                    })
                    .then(() => { globalCloud.textContent = "☁️ Guardado en nube"; })
                    .catch(() => { globalCloud.textContent = "❌ Error"; });
                }
            });
        }
    }

    function actualizarEstilosCelda(celda, icono, horas, estado, horasCustom) {
        celda.classList.remove('state-dia', 'state-noche', 'state-extra', 'state-libre');
        const info = infoTurnos[estado] || infoTurnos[""];
        icono.textContent = info.icon;
        
        // Si hay una hora personalizada guardada en la base de datos la prioriza, sino usa la de por defecto
        horas.textContent = horasCustom ? horasCustom : info.horas;
        
        if (info.class) {
            celda.classList.add(info.class);
        }
    }

    // Lógica del Autocompletado Secuencial 4x4 (Adaptada a tu base de datos estática)
    document.getElementById('autoCompletarBtn').addEventListener('click', async () => {
        const diaInicio = parseInt(document.getElementById('autoDiaInicio').value);
        const turnoInicial = document.getElementById('autoTurnoInicial').value;

        if (!diaInicio || diaInicio < 1 || diaInicio > 31) {
            alert("Por favor, ingresa un número de día válido entre 1 y 31.");
            return;
        }

        const globalCloud = document.getElementById('globalCloudStatus');
        globalCloud.textContent = "⏳ Autocompletando patrón...";

        const patron = [
            'D','D','D','D',
            'N','N','N','N',
            'L','L','L','L'
        ];

        let indiceCiclo = patron.indexOf(turnoInicial);

        // Llenar desde el día elegido hasta el día 31
        for (let i = 1; i <= 31; i++) {
            if (i >= diaInicio) {
                const desplazamiento = i - diaInicio;
                const indiceCalculado = (indiceCiclo + desplazamiento) % patron.length;
                const turnoAsignado = patron[indiceCalculado];

                // Guardar directamente en tus documentos fijos `dia_1`, `dia_2`...
                await setDoc(doc(db, "usuarios_4x4", currentUser.uid, "turnos", `dia_${i}`), {
                    texto: turnoAsignado,
                    horasCustom: ""
                });
            }
        }

        globalCloud.textContent = "☁️ Sincronizado";
        alert("¡Patrón rotativo 4x4 aplicado perfectamente!");
        
        // Refrescar la pantalla de inmediato
        window.location.reload();
    });
</script>
</body>
</html>
