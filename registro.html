<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Horario Web - Registro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #4f46e5, #06b6d4); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; }
        .container { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #1e293b; margin-bottom: 24px; font-size: 28px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; color: #64748b; margin-bottom: 8px; font-size: 14px; font-weight: 600; }
        input { width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; outline: none; transition: border-color 0.2s; }
        input:focus { border-color: #4f46e5; }
        .password-container { position: relative; }
        .toggle-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 18px; color: #64748b; }
        button.submit-btn { width: 100%; padding: 14px; background: #06b6d4; color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        button.submit-btn:hover { background: #0891b2; }
        p { margin-top: 20px; color: #64748b; font-size: 14px; }
        a { color: #4f46e5; text-decoration: none; font-weight: 600; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h2>Crear Cuenta</h2>
    <form id="registerForm">
        <div class="input-group">
            <label>Nombre Completo</label>
            <input type="text" id="nombre" required placeholder="Tu nombre">
        </div>
        <div class="input-group">
            <label>Correo Electrónico</label>
            <input type="email" id="email" required placeholder="correo@ejemplo.com">
        </div>
        <div class="input-group">
            <label>Contraseña</label>
            <div class="password-container">
                <input type="password" id="password" required placeholder="Mínimo 6 caracteres">
                <button type="button" class="toggle-btn" id="togglePassword">👁️</button>
            </div>
        </div>
        <button type="submit" class="submit-btn">Registrarse</button>
    </form>
    <p>¿Ya tienes cuenta? <a href="index.html">Inicia sesión aquí</a></p>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBCu4ytuNDza5MrNGz2Vlb20Mh6xeBCMqk",
      authDomain: "calendario-4x4-f66d7.firebaseapp.com",
      projectId: "calendario-4x4-f66d7",
      storageBucket: "calendario-4x4-f66d7.firebasestorage.app",
      messagingSenderId: "441544580100",
      appId: "1:441544580100:web:7afd53b9933afdf9c36951",
      measurementId: "G-908HDX2J47"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    const passwordInput = document.getElementById('password');
    const togglePasswordBtn = document.getElementById('togglePassword');
    togglePasswordBtn.addEventListener('click', () => {
        const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordInput.setAttribute('type', type);
        togglePasswordBtn.textContent = type === 'password' ? '👁️' : '🙈';
    });

    document.getElementById('registerForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const nombre = document.getElementById('nombre').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        createUserWithEmailAndPassword(auth, email, password)
            .then((userCredential) => {
                updateProfile(userCredential.user, {
                    displayName: nombre
                }).then(() => {
                    alert("¡Cuenta creada con éxito!");
                    window.location.href = "calendario.html";
                });
            })
            .catch((error) => {
                alert("Error de registro: " + error.message);
            });
    });
</script>
</body>
</html>
