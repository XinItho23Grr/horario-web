<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', system-ui, sans-serif; }
        body { 
            background: #f8fafc; 
            min-height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            padding: 20px; 
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 24px; 
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            width: 100%; 
            max-width: 400px; 
            text-align: center;
            border: 1px solid #e2e8f0;
        }
        h2 { color: #0f172a; margin-bottom: 8px; font-size: 24px; letter-spacing: -0.5px; }
        .subtitle { color: #64748b; margin-bottom: 24px; font-size: 14px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; color: #475569; margin-bottom: 8px; font-size: 13px; font-weight: 600; }
        input { 
            width: 100%; 
            padding: 14px 16px; 
            border: 1.5px solid #e2e8f0; 
            border-radius: 12px; 
            font-size: 15px; 
            transition: all 0.3s ease;
            background: #f1f5f9;
        }
        input:focus { 
            border-color: #4f46e5; 
            background: white; 
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            outline: none;
        }
        button.submit-btn { 
            width: 100%; 
            padding: 14px; 
            background: #4f46e5; 
            color: white; 
            border: none; 
            border-radius: 12px; 
            font-size: 15px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: transform 0.2s, background 0.2s;
        }
        button.submit-btn:hover { background: #4338ca; transform: translateY(-1px); }
        .back-link { margin-top: 20px; }
        a { color: #4f46e5; font-size: 14px; font-weight: 500; text-decoration: none; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="container">
    <h2>Recuperar acceso</h2>
    <p class="subtitle">Te enviaremos un correo con los pasos para restablecer tu contraseña.</p>
    
    <form id="resetForm">
        <div class="input-group">
            <label>Correo Electrónico</label>
            <input type="email" id="resetEmail" required placeholder="nombre@ejemplo.com">
        </div>
        <button type="submit" class="submit-btn">Enviar instrucciones</button>
    </form>
    
    <div class="back-link">
        <a href="index.html">← Volver al inicio</a>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // Asegúrate de usar la misma configuración que en tu login
    const firebaseConfig = {
        apiKey: "AIzaSyBCu4ytuNDza5MrNGz2Vlb20Mh6xeBCMqk",
        authDomain: "calendario-4x4-f66d7.firebaseapp.com",
        projectId: "calendario-4x4-f66d7",
        storageBucket: "calendario-4x4-f66d7.firebasestorage.app",
        messagingSenderId: "441544580100",
        appId: "1:441544580100:web:7afd53b9933afdf9c36951",
        measurementId: "G-908HDX2J47"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    document.getElementById('resetForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('resetEmail').value;

        try {
            await sendPasswordResetEmail(auth, email);
            alert("Se ha enviado un correo de recuperación a: " + email);
            window.location.href = "index.html";
        } catch (error) {
            alert("Error: " + error.message);
        }
    });
</script>
</body>
</html>
